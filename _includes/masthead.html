<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item">
            <a href="https://wanghan0501.github.io/" target="_self">
              <img class="svg" src="/images/en.svg" width="20pt"> 
              HomePage
            </a>
          </li>
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
          <li class="masthead__menu-item masthead__lang-switch">
            {% if page.url contains '/en/' %}
            <span class="lang-active">English Resume</span>
            {% else %}
            <a href="/en/">English Resume</a>
            {% endif %}
            <span class="lang-sep">/</span>
            {% if page.url contains '/en/' %}
            <a href="/">中文简历</a>
            {% else %}
            <span class="lang-active">中文简历</span>
            {% endif %}
          </li>
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
